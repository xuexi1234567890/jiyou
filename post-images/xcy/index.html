<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>实验小菜园</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<style>
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}
			canvas, img {
				width: 90%;
				margin: 0 auto; /* 水平居中 */
			}
		</style>
		
    </head>
    <body>
        <h1>实验小菜园</h1>
        <p>欢迎来到实验小菜园！</p>
		<p>限时项目，2024年5月16号上线，预计存在一周。</p>
        <div>
            <canvas id="temperatureChart"></canvas>
            <canvas id="humidityChart"></canvas>
            <canvas id="lightChart"></canvas>
        </div>
		<div>
			<h2>生长情况</h2>
			<img src="https://raw.gitmirror.com/xuexi1234567890/jiyou/main/post-images/xcy/cy1.jpg" alt="菜园1">
		</div>
        <script>
            // 温度图表
            const tempData = {
                labels: ['点1', '点2', '点3', '点4', '点5'],
                datasets: [{
                    label: '温度 (°C)',
                    backgroundColor: 'rgb(255, 99, 132)',
                    borderColor: 'rgb(255, 99, 132)',
                    data: [22, 19, 21, 24, 23]
                }]
            };
            const tempConfig = {
                type: 'line',
                data: tempData,
                options: {}
            };
            new Chart(document.getElementById('temperatureChart'), tempConfig);

            // 湿度图表
            const humidityData = {
                labels: ['点1', '点2', '点3', '点4', '点5'],
                datasets: [{
                    label: '湿度 (%)',
                    backgroundColor: 'rgb(54, 162, 235)',
                    borderColor: 'rgb(54, 162, 235)',
                    data: [82, 88, 85, 84, 86]
                }]
            };
            const humidityConfig = {
                type: 'line',
                data: humidityData,
                options: {}
            };
            new Chart(document.getElementById('humidityChart'), humidityConfig);

            // 光照图表
            const lightData = {
                labels: ['点1', '点2', '点3', '点4', '点5'],
                datasets: [{
                    label: '光照 (lux)',
                    backgroundColor: 'rgb(255, 205, 86)',
                    borderColor: 'rgb(255, 205, 86)',
                    data: [500, 800, 650, 700, 600]
                }]
            };
            const lightConfig = {
                type: 'line',
                data: lightData,
                options: {}
            };
            new Chart(document.getElementById('lightChart'), lightConfig);
        </script>
    </body>
</html>
